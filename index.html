<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPO ENPROM - Formularz</title>
    <style>
        body {
            font-family: "Century Gothic", AppleGothic, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px;
            color: #333;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 550px;
            margin: 0 auto;
        }

        h2 {
            color: #004481;
            text-align: center;
            font-size: 1.4em;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 0;
        }

        h3 {
            font-size: 0.85em;
            color: #555;
            text-transform: uppercase;
            margin-top: 20px;
            border-left: 4px solid #004481;
            padding-left: 10px;
            letter-spacing: 1px;
        }

        label {
            display: block;
            margin: 12px 0 5px;
            font-weight: bold;
            font-size: 0.9em;
        }

        input, select, textarea {
            width: 100%;
            height: 50px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: "Century Gothic", sans-serif;
            box-sizing: border-box;
            background: #fff;
        }

        textarea { height: auto; padding: 10px; }

        .sap-box {
            background: #e7f3ff;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            color: #004481;
            text-align: center;
            margin: 10px 0;
            border: 1px solid #b3d7ff;
        }

        button {
            width: 100%;
            height: 65px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            font-family: "Century Gothic", sans-serif;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 10px rgba(40,167,69,0.3);
        }

        button:active { transform: scale(0.97); background: #218838; }

        .footer-note {
            font-size: 0.75em;
            color: #888;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Zgłoszenie KPO</h2>
    
    <form id="kpoForm">
        <!-- 1. BUDOWA -->
        <h3>1. Projekt i Lokalizacja</h3>
        <label>Wytwarzający (Stacja/Budowa):</label>
        <select id="project_select" onchange="updateSap()">
            <option value="" data-sap="">-- Wybierz projekt --</option>
            <option value="232751 Bałtyk II&III" data-sap="232751">232751 Bałtyk II&III</option>
            <option value="211271 Baltic Power" data-sap="211271">211271 Baltic Power</option>
            <option value="223381 CCGT Grudziądz" data-sap="223381">223381 CCGT Grudziądz</option>
            <option value="233026 CCGT Ostrołęka" data-sap="233026">233026 CCGT Ostrołęka</option>
            <option value="235415 SE_Bałtyk II_Hitachi" data-sap="235415">235415 SE_Bałtyk II_Hitachi</option>
            <option value="235926 SE Leszno_Gronowo" data-sap="222222">235926 SE Leszno (SAP: 222222)</option>
            <option value="244756 SE Polkowice" data-sap="244756">244756 SE Polkowice</option>
            <option value="245165 Rokitnica" data-sap="245165">245165 Rokitnica</option>
            <option value="250380 Słupsk 400kV450kV" data-sap="250380">250380 Słupsk 400kV450kV</option>
            <option value="203002 150kV BBR-KAS" data-sap="203002">203002 150kV BBR-KAS</option>
            <option value="220042 CPK" data-sap="220042">220042 CPK</option>
            <option value="232751 Kabel Equinor" data-sap="232751">232751 Kabel Equinor</option>
            <option value="234011 380 kV LE Stade" data-sap="234011">234011 380 kV LE Stade</option>
            <option value="234321 LE Kabl 230kV BLP" data-sap="234321">234321 LE Kabl 230kV BLP</option>
            <option value="234372 S19" data-sap="234372">234372 S19</option>
            <option value="242931 KCPD NASK" data-sap="242931">242931 KCPD NASK</option>
            <option value="244312 110kV Bolesławiec" data-sap="244312">244312 110kV Bolesławiec</option>
            <option value="244668 Baltic I Onshore" data-sap="244668">244668 Baltic I Onshore</option>
            <option value="250001 Bud. L400kV Choczewo" data-sap="250001">250001 L400kV Choczewo</option>
            <option value="250002 Trębaczew Rokitnica" data-sap="250002">250002 Trębaczew Rokitnica</option>
            <option value="250094 PT Luzino" data-sap="250094">250094 PT Luzino</option>
            <option value="250147 Chełm" data-sap="250147">250147 Chełm</option>
            <option value="250415 Modernizacja L110 Siersza" data-sap="250415">250415 L110 Siersza</option>
            <option value="250441 Radzyń łuków 110kV" data-sap="250441">250441 Radzyń łuków 110kV</option>
            <option value="250631 LE Choczewo Słupsk" data-sap="250631">250631 LE Choczewo Słupsk</option>
            <option value="250671 LK400 ME Kartoszyn" data-sap="250671">250671 LK400 ME Kartoszyn</option>
            <option value="251260 Orlen Płock" data-sap="251260">251260 Orlen Płock</option>
            <option value="251446 LN 110kVCzechnica" data-sap="251446">251446 LN 110kVCzechnica</option>
        </select>
        <div class="sap-box">NR SAP: <span id="display_sap">---</span></div>

        <!-- 2. ODPAD -->
        <h3>2. Dane Odpadu</h3>
        <label>Kod odpadu:</label>
        <select id="kod_odpadu">
            <option value="">-- Wybierz kod --</option>
            <option value="17 01 01 (Beton)">17 01 01 - Beton</option>
            <option value="17 04 05 (Stal)">17 04 05 - Stal/Żelazo</option>
            <option value="17 04 11 (Kable)">17 04 11 - Kable</option>
            <option value="17 09 04 (Zmieszane)">17 09 04 - Zmieszane budowlane</option>
            <option value="15 01 01 (Papier)">15 01 01 - Papier/Tektura</option>
        </select>

        <label>Masa odpadu [Mg / tony]:</label>
        <input type="number" id="masa" step="0.0001" placeholder="0,0000" oninput="limitDecimal(this, 4)">

        <!-- 3. TRANSPORT -->
        <h3>3. Logistyka</h3>
        <label>Numer rejestracyjny:</label>
        <input type="text" id="nr_rej" placeholder="np. PO 12345">

        <label>Godzina rozpoczęcia:</label>
        <input type="time" id="godzina">

        <!-- 4. PODMIOTY -->
        <h3>4. Przejmujący / Transport</h3>
        <label>Baza firm:</label>
        <select id="firma_baza" onchange="fillFirma()">
            <option value="">-- Wpisz ręcznie --</option>
            <option value="Remondis" data-bdo="000001234" data-addr="ul. Poznańska 1, Poznań">Remondis</option>
            <option value="M-EKO" data-bdo="000005678" data-addr="ul. Kolejowa 12, Swarzędz">M-EKO</option>
        </select>

        <input type="text" id="f_nazwa" placeholder="Nazwa firmy">
        <input type="text" id="f_bdo" placeholder="Nr BDO">
        <textarea id="f_adres" placeholder="Adres zakładu" rows="2"></textarea>

        <h3>5. Inne</h3>
        <label>Uwagi:</label>
        <textarea id="uwagi" placeholder="Dodatkowe informacje..." rows="3"></textarea>

        <button type="button" onclick="sendEmail()">WYŚLIJ ZGŁOSZENIE</button>

        <div class="footer-note">Zgłoszenie trafi do s.korab@enprom.pl</div>
    </form>
</div>

<script>
    function updateSap() {
        const sel = document.getElementById('project_select');
        const sap = sel.options[sel.selectedIndex].getAttribute('data-sap');
        document.getElementById('display_sap').innerText = sap || "---";
    }

    function limitDecimal(el, max) {
        if (el.value.indexOf(".") !== -1) {
            if (el.value.split(".")[1].length > max) {
                el.value = parseFloat(el.value).toFixed(max);
            }
        }
    }

    function fillFirma() {
        const sel = document.getElementById('firma_baza');
        const opt = sel.options[sel.selectedIndex];
        document.getElementById('f_nazwa').value = sel.value || "";
        document.getElementById('f_bdo').value = opt.dataset.bdo || "";
        document.getElementById('f_adres').value = opt.dataset.addr || "";
    }

    function sendEmail() {
        const email = "s.korab@enprom.pl";
        const budowa = document.getElementById('project_select').value;
        const sap = document.getElementById('display_sap').innerText;
        const odpad = document.getElementById('kod_odpadu').value;
        const masa = document.getElementById('masa').value;
        const nrRej = document.getElementById('nr_rej').value;
        const godzina = document.getElementById('godzina').value;
        const fNazwa = document.getElementById('f_nazwa').value;
        const fBdo = document.getElementById('f_bdo').value;
        const fAdres = document.getElementById('f_adres').value;
        const uwagi = document.getElementById('uwagi').value;

        if(!budowa || !odpad || !nrRej || !masa) {
            alert("Uzupełnij Budowę, Odpad, Masę i Nr Rejestracyjny!");
            return;
        }

        const subject = `KPO: ${sap} | ${nrRej} | ${masa} Mg`;
        
        const body = `DANE DO WYSTAWIENIA KARTY KPO
==========================================
PROJEKT:      ${budowa}
NR SAP:       ${sap}
==========================================
ODPAD:        ${odpad}
MASA [Mg]:    ${masa}
POJAZD:       ${nrRej}
GODZINA:      ${godzina}
==========================================
PRZEJMUJĄCY:  ${fNazwa}
NR BDO:       ${fBdo}
ADRES:        ${fAdres}
==========================================
UWAGI:
${uwagi || 'brak'}
==========================================`;

        window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }

    window.onload = () => {
        const now = new Date();
        document.getElementById('godzina').value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    };
</script>

</body>
</html>
