<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPO ENPROM - Mobile</title>
    <style>
        body {
            font-family: "Century Gothic", AppleGothic, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px;
            color: #333;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 550px;
            margin: 0 auto;
        }

        h2 {
            color: #004481;
            text-align: center;
            font-size: 1.4em;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 0;
        }

        .warning-info {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8em;
            text-align: center;
            margin-bottom: 15px;
            border: 1px solid #ffeeba;
        }

        h3 {
            font-size: 0.85em;
            color: #555;
            text-transform: uppercase;
            margin-top: 25px;
            border-left: 4px solid #004481;
            padding-left: 10px;
            letter-spacing: 1px;
        }

        label {
            display: block;
            margin: 12px 0 5px;
            font-weight: bold;
            font-size: 0.9em;
        }

        input, select, textarea {
            width: 100%;
            height: 45px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
            background: #fff;
        }

        textarea { height: auto; }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }

        .row div { flex: 1; }

        .sap-box {
            background: #e7f3ff;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            color: #004481;
            text-align: center;
            margin: 10px 0;
            border: 1px solid #b3d7ff;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            border: 1px dashed #ccc;
        }

        .checkbox-container input {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }

        button {
            width: 100%;
            height: 65px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 10px rgba(40,167,69,0.3);
        }

        button:active { transform: scale(0.97); background: #218838; }

        .footer-note {
            font-size: 0.75em;
            color: #888;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Zgłoszenie KPO</h2>
    <div class="warning-info">ℹ️ Formularz przesyła dane do biura w celu wystawienia karty w systemie BDO.</div>
    
    <form id="kpoForm">
        <h3>1. Wytwarzający (Budowa)</h3>
        <label>Projekt:</label>
        <select id="project_select" onchange="updateProjectData()">
            <option value="" data-sap="">-- Wybierz projekt --</option>
            <option value="SE Leszno Gronówko" 
                    data-sap="240030" 
                    data-ulica="Gronówko 30" 
                    data-kod="64-111" 
                    data-miasto="Lipno" 
                    data-woj="wielkopolskie">240030 SE Leszno Gronówko</option>
            <option value="SE Polkowice" 
                    data-sap="244756" 
                    data-ulica="ul. Energetyków 4" 
                    data-kod="59-101" 
                    data-miasto="Polkowice" 
                    data-woj="dolnośląskie">244756 SE Polkowice</option>
            <option value="Bałtyk II&III" data-sap="232751">232751 Bałtyk II&III</option>
            <option value="Baltic Power" data-sap="211271">211271 Baltic Power</option>
        </select>
        
        <div class="sap-box">NR SAP: <span id="display_sap">---</span></div>

        <label>Ulica i nr:</label>
        <input type="text" id="w_ulica" placeholder="ul. Przykładowa 1">
        
        <div class="row">
            <div>
                <label>Kod pocztowy:</label>
                <input type="text" id="w_kod" placeholder="00-000">
            </div>
            <div>
                <label>Miasto:</label>
                <input type="text" id="w_miasto" placeholder="Miasto">
            </div>
        </div>

        <label>Województwo:</label>
        <input type="text" id="w_woj" placeholder="Województwo">

        <h3>2. Dane Odpadu</h3>
        <label>Kod odpadu:</label>
        <select id="kod_odpadu">
            <option value="">-- Wybierz kod --</option>
            <option value="17 01 01 (Beton)">17 01 01 - Beton</option>
            <option value="17 04 05 (Stal)">17 04 05 - Stal/Żelazo</option>
            <option value="17 04 11 (Kable)">17 04 11 - Kable</option>
            <option value="17 09 04 (Zmieszane)">17 09 04 - Zmieszane budowlane</option>
            <option value="15 01 01 (Papier)">15 01 01 - Papier/Tektura</option>
        </select>

        <div class="row">
            <div>
                <label>Masa [Mg]:</label>
                <input type="number" id="masa" step="0.0001" placeholder="0,0000">
            </div>
            <div>
                <label>Nr rej. pojazdu:</label>
                <input type="text" id="nr_rej" placeholder="np. PO 12345">
            </div>
        </div>

        <label>Godzina rozpoczęcia transportu:</label>
        <input type="time" id="godzina">

        <h3>3. Transportujący</h3>
        <label>Wybierz firmę:</label>
        <select id="transport_baza" onchange="fillTransport()">
            <option value="">-- Wpisz ręcznie --</option>
            <option value="Remondis" data-bdo="000001234">Remondis</option>
            <option value="M-EKO" data-bdo="000005678">M-EKO</option>
        </select>
        <input type="text" id="t_nazwa" placeholder="Nazwa firmy transportowej">
        <input type="text" id="t_bdo" placeholder="Nr BDO transportującego">

        <h3>4. Przejmujący (Odbiorca)</h3>
        <div class="checkbox-container">
            <input type="checkbox" id="same_as_trans" onchange="syncReceiver()">
            <label for="same_as_trans" style="margin:0; font-size: 0.85em;">Odbiorca to ten sam podmiot co transport</label>
        </div>
        
        <label>Nazwa Odbiorcy:</label>
        <input type="text" id="o_nazwa" placeholder="Nazwa firmy przejmującej">
        
        <label>Nr BDO Odbiorcy:</label>
        <input type="text" id="o_bdo" placeholder="Nr BDO przejmującego">
        
        <label>Miejsce Prowadzenia Działalności (MPD):</label>
        <textarea id="o_adres" placeholder="Dokładny adres zakładu/miejsca odbioru odpadu" rows="2"></textarea>

        <h3>5. Inne</h3>
        <label>Uwagi:</label>
        <textarea id="uwagi" placeholder="Dodatkowe informacje..." rows="2"></textarea>

        <button type="button" onclick="sendEmail()">WYŚLIJ ZGŁOSZENIE (MAIL)</button>

        <div class="footer-note">Zgłoszenie do: Biuro, P. Kowaluk, T. Rzepliński</div>
    </form>
</div>

<script>
    window.onload = () => {
        const now = new Date();
        document.getElementById('godzina').value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    };

    function updateProjectData() {
        const sel = document.getElementById('project_select');
        const opt = sel.options[sel.selectedIndex];
        
        document.getElementById('display_sap').innerText = opt.getAttribute('data-sap') || "---";
        document.getElementById('w_ulica').value = opt.dataset.ulica || "";
        document.getElementById('w_kod').value = opt.dataset.kod || "";
        document.getElementById('w_miasto').value = opt.dataset.miasto || "";
        document.getElementById('w_woj').value = opt.dataset.woj || "";
    }

    function fillTransport() {
        const sel = document.getElementById('transport_baza');
        const opt = sel.options[sel.selectedIndex];
        document.getElementById('t_nazwa').value = sel.value || "";
        document.getElementById('t_bdo').value = opt.dataset.bdo || "";
        
        if(document.getElementById('same_as_trans').checked) {
            syncReceiver();
        }
    }

    function syncReceiver() {
        const isSame = document.getElementById('same_as_trans').checked;
        const oNazwa = document.getElementById('o_nazwa');
        const oBdo = document.getElementById('o_bdo');

        if(isSame) {
            oNazwa.value = document.getElementById('t_nazwa').value;
            oBdo.value = document.getElementById('t_bdo').value;
            oNazwa.readOnly = true;
            oBdo.readOnly = true;
            oNazwa.style.background = "#f0f0f0";
            oBdo.style.background = "#f0f0f0";
        } else {
            oNazwa.readOnly = false;
            oBdo.readOnly = false;
            oNazwa.style.background = "#fff";
            oBdo.style.background = "#fff";
        }
    }

    function sendEmail() {
        const to = "s.korab@enprom.pl;p.kowaluk@enprom.pl;t.rzeplinski@enprom.pl";
        const cc = "m.ewiak@enprom.pl";
        
        const budowa = document.getElementById('project_select').value;
        const sap = document.getElementById('display_sap').innerText;
        const w_adr = `${document.getElementById('w_ulica').value}, ${document.getElementById('w_kod').value} ${document.getElementById('w_miasto').value} (${document.getElementById('w_woj').value})`;
        
        const odpad = document.getElementById('kod_odpadu').value;
        const masa = document.getElementById('masa').value;
        const nrRej = document.getElementById('nr_rej').value;
        const godzina = document.getElementById('godzina').value;
        
        const tNazwa = document.getElementById('t_nazwa').value;
        const tBdo = document.getElementById('t_bdo').value;
        
        const oNazwa = document.getElementById('o_nazwa').value;
        const oBdo = document.getElementById('o_bdo').value;
        const oAdres = document.getElementById('o_adres').value;
        
        const uwagi = document.getElementById('uwagi').value;

        if(!budowa || !odpad || !nrRej || !masa || !oNazwa || !tNazwa || !oAdres) {
            alert("BŁĄD: Uzupełnij Projekt, Odpad, Masę, Pojazd oraz pełne dane Odbiorcy (w tym MPD)!");
            return;
        }

        const subject = `KPO: ${sap} | ${nrRej} | ${masa} Mg`;
        
        const body = `DANE DO WYSTAWIENIA KARTY KPO
==========================================
1. WYTWARZAJĄCY (BUDOWA):
Projekt:  ${budowa}
NR SAP:   ${sap}
Adres:    ${w_adr}
==========================================
2. DANE ODPADU:
Kod:      ${odpad}
Masa:     ${masa} Mg
Pojazd:   ${nrRej}
Godzina:  ${godzina}
==========================================
3. TRANSPORTUJĄCY:
Firma:    ${tNazwa}
BDO:      ${tBdo}
==========================================
4. PRZEJMUJĄCY (ODBIORCA):
Firma:    ${oNazwa}
BDO:      ${oBdo}
MPD (Miejsce Odbioru): 
${oAdres}
==========================================
UWAGI:
${uwagi || 'brak'}

------------------------------------------
Wysłano z formularza mobilnego ENPROM.`;

        window.location.href = `mailto:${to}?cc=${cc}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }
</script>

</body>
</html>
