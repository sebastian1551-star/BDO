<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zgłoszenie KPO ENPROM</title>
    <style>
        /* Ustawienie czcionki Century Gothic */
        body {
            font-family: "Century Gothic", AppleGothic, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px;
            color: #333;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 550px;
            margin: 0 auto;
        }

        h2 {
            color: #004481;
            text-align: center;
            font-size: 1.5em;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        h3 {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            margin-top: 25px;
            border-left: 4px solid #004481;
            padding-left: 10px;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
            font-size: 0.9em;
        }

        /* Stylizacja pod telefon - duże pola */
        input, select, textarea {
            width: 100%;
            height: 50px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: "Century Gothic", sans-serif;
            box-sizing: border-box;
        }

        select {
            background-color: #fff;
        }

        .sap-box {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            color: #004481;
            text-align: center;
            margin-top: 5px;
            font-size: 1.1em;
            border: 1px dashed #004481;
        }

        button {
            width: 100%;
            height: 65px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            font-family: "Century Gothic", sans-serif;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 10px rgba(40,167,69,0.3);
        }

        button:active {
            transform: scale(0.97);
            background: #218838;
        }

        .footer-note {
            font-size: 0.75em;
            color: #888;
            text-align: center;
            margin-top: 15px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Zgłoszenie KPO</h2>
    
    <form id="kpoForm">
        <!-- PROJEKTY -->
        <h3>1. Wybór Projektu</h3>
        <label>Wytwarzający (Budowa):</label>
        <select id="project_select" onchange="handleProjectChange()">
            <option value="" data-sap="">-- Wybierz stację z listy --</option>
            <!-- Dane z image_baecde.png -->
            <option value="211271 Baltic Power" data-sap="211271">211271 Baltic Power</option>
            <option value="223381 CCGT Grudziądz" data-sap="223381">223381 CCGT Grudziądz</option>
            <option value="233026 CCGT Ostrołęka" data-sap="233026">233026 CCGT Ostrołęka</option>
            <option value="235415 SE_Bałtyk II_Hitachi" data-sap="235415">235415 SE_Bałtyk II_Hitachi</option>
            <option value="235926 SE Leszno_Gronowo Modernizacja" data-sap="222222">235926 SE Leszno (SAP: 222222)</option>
            <option value="244756 SE Polkowice" data-sap="244756">244756 SE Polkowice</option>
            <option value="245165 Rokitnica" data-sap="245165">245165 Rokitnica</option>
            <option value="250380 Słupsk 400kV450kV" data-sap="250380">250380 Słupsk 400kV450kV</option>
            <!-- Nowa stacja -->
            <option value="232751 Bałtyk II&III" data-sap="232751">232751 Bałtyk II&III</option>
            <!-- Dane z image_ba9b3b.png -->
            <option value="203002 150kV BBR-KAS, LYK-BMO" data-sap="203002">203002 150kV BBR-KAS (Dania)</option>
            <option value="220042 CPK" data-sap="220042">220042 CPK</option>
            <option value="232751 Kabel Equinor" data-sap="232751">232751 Kabel Equinor</option>
            <option value="234011 380 kV LE Stade- Landesbergen" data-sap="234011">234011 380 kV LE Stade</option>
            <option value="234321 LE Kabl 230kV BLP" data-sap="234321">234321 LE Kabl 230kV BLP</option>
            <option value="234372 S19" data-sap="234372">234372 S19</option>
            <option value="242931 KCPD NASK" data-sap="242931">242931 KCPD NASK</option>
            <option value="244312 110kV Bolesławiec Świętoszów" data-sap="244312">244312 110kV Bolesławiec</option>
            <option value="244668 Baltic I Onshore execution" data-sap="244668">244668 Baltic I Onshore</option>
            <option value="250001 Bud. L400kV Choczewo-Grudziądz" data-sap="250001">250001 L400kV Choczewo-Grudz.</option>
            <option value="250002 Trębaczew Rokitnica 400kV" data-sap="250002">250002 Trębaczew Rokitnica</option>
            <option value="250094 PT Luzino" data-sap="250094">250094 PT Luzino</option>
            <option value="250147 Chełm" data-sap="250147">250147 Chełm</option>
            <option value="250415 Modernizacja linii L110 Siersza" data-sap="250415">250415 L110 Siersza-Trzebinia</option>
            <option value="250441 Radzyń łuków 110kV" data-sap="250441">250441 Radzyń łuków 110kV</option>
            <option value="250631 LE Choczewo Słupsk 400kV" data-sap="250631">250631 LE Choczewo Słupsk</option>
            <option value="250671 LK400 ME Kartoszyn Zarnowiec" data-sap="250671">250671 LK400 ME Kartoszyn</option>
            <option value="251260 Bud przył.110 Orlen Płock" data-sap="251260">251260 Orlen Płock</option>
            <option value="251446 LN 110kVCzechnica-Oleśnica" data-sap="251446">251446 LN 110kVCzechnica-Oleśn.</option>
        </select>

        <div class="sap-box">NR SAP: <span id="display_sap">---</span></div>

        <!-- ODPADY -->
        <h3>2. Informacje o Odpadzie</h3>
        <label>Kod i nazwa odpadu:</label>
        <select id="kod_odpadu">
            <option value="">-- Wybierz kod --</option>
            <option value="17 01 01 (Beton)">17 01 01 - Beton</option>
            <option value="17 04 05 (Żelazo i stal)">17 04 05 - Żelazo i stal</option>
            <option value="17 04 11 (Kable)">17 04 11 - Kable</option>
            <option value="17 09 04 (Zmieszane budowlane)">17 09 04 - Zmieszane budowlane</option>
            <option value="15 01 01 (Papier i tektura)">15 01 01 - Papier i tektura</option>
            <option value="20 03 01 (Komunalne)">20 03 01 - Komunalne</option>
        </select>

        <!-- TRANSPORT -->
        <h3>3. Transport</h3>
        <label>Numer rejestracyjny:</label>
        <input type="text" id="nr_rej" placeholder="Wpisz nr rejestracyjny pojazdu" required>

        <label>Godzina rozpoczęcia:</label>
        <input type="time" id="godzina_start">

        <!-- PODMIOTY -->
        <h3>4. Odbiorca Odpadu</h3>
        <label>Wybierz firmę z bazy:</label>
        <select id="firma_baza" onchange="handleFirmaChange()">
            <option value="">-- Wpisz ręcznie --</option>
            <option value="Remondis" data-bdo="000001234" data-addr="ul. Poznańska 1, 60-100 Poznań">Remondis</option>
            <option value="M-EKO" data-bdo="000005678" data-addr="ul. Kolejowa 12, 62-020 Swarzędz">M-EKO</option>
        </select>

        <label>Nazwa Firmy:</label>
        <input type="text" id="f_nazwa" placeholder="Nazwa podmiotu przejmującego">
        
        <label>Numer BDO:</label>
        <input type="text" id="f_bdo" placeholder="Wpisz numer BDO">

        <label>Miejsce prowadzenia działalności (Adres):</label>
        <textarea id="f_adres" style="height:80px;" placeholder="Adres zakładu odbiorczego"></textarea>

        <button type="button" onclick="sendToOutlook()">WYŚLIJ DO OUTLOOK</button>

        <div class="footer-note">
            Po kliknięciu otworzy się wiadomość e-mail.<br>
            <strong>Karta zostanie wystawiona przez biuro.</strong>
        </div>
    </form>
</div>

<script>
    // Automatyczna aktualizacja SAP
    function handleProjectChange() {
        const select = document.getElementById('project_select');
        const sap = select.options[select.selectedIndex].getAttribute('data-sap');
        document.getElementById('display_sap').innerText = sap ? sap : "---";
    }

    // Automatyczne wypełnianie bazy firm
    function handleFirmaChange() {
        const select = document.getElementById('firma_baza');
        const opt = select.options[select.selectedIndex];
        
        document.getElementById('f_nazwa').value = select.value || "";
        document.getElementById('f_bdo').value = opt.getAttribute('data-bdo') || "";
        document.getElementById('f_adres').value = opt.getAttribute('data-addr') || "";
    }

    // Formułowanie "Tabelki" do Outlooka
    function sendToOutlook() {
        const email = "s.korab@enprom.pl";
        const budowa = document.getElementById('project_select').value;
        const sap = document.getElementById('display_sap').innerText;
        const odpad = document.getElementById('kod_odpadu').value;
        const nrRej = document.getElementById('nr_rej').value;
        const godzina = document.getElementById('godzina_start').value;
        const firma = document.getElementById('f_nazwa').value;
        const bdo = document.getElementById('f_bdo').value;
        const adres = document.getElementById('f_adres').value;

        if (!budowa || !odpad || !nrRej) {
            alert("BŁĄD: Wybierz Budowę, Odpad i wpisz Nr Rejestracyjny!");
            return;
        }

        const subject = `KPO: ${sap} | ${nrRej} | ${budowa}`;
        
        // Układ tabelaryczny w tekście maila
        const body = `DANE DO WYSTAWIENIA KARTY KPO
==========================================
PROJEKT:      ${budowa}
NR SAP:       ${sap}
==========================================
ODPAD:        ${odpad}
POJAZD:       ${nrRej}
GODZINA:      ${godzina}
==========================================
ODBIORCA:     ${firma}
BDO ODB.:     ${bdo}
ADRES ZAKŁ.:  ${adres}
==========================================

Proszę o wystawienie karty w BDO i odesłanie PDF.`;

        const mailtoLink = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        
        window.location.href = mailtoLink;
    }

    // Domyślny czas przy starcie
    window.onload = () => {
        const now = new Date();
        document.getElementById('godzina_start').value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    };
</script>

</body>
</html>
